<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nimbo AI 后台</title>
    <link rel="icon" href="/brand.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="operator-page">
    <section id="loginScreen" class="login-screen">
      <form id="loginForm" class="login-card">
        <img src="/brand.svg" alt="" />
        <h1>Nimbo AI</h1>
        <p>后台控制台</p>
        <input id="pinInput" type="password" inputmode="numeric" autocomplete="current-password" placeholder="输入后台 PIN" aria-label="后台 PIN" />
        <button id="loginButton" class="wide-button" type="submit">进入后台</button>
        <div id="loginError" class="login-error" role="status"></div>
      </form>
    </section>
    <main class="operator-layout">
      <aside class="session-sidebar">
        <div class="session-header">
          <div>
            <span>在线用户</span>
            <strong id="activeCount">0</strong>
          </div>
        </div>
        <div id="sessionList" class="session-list"></div>
      </aside>
      <section class="operator-chat">
        <header class="topbar">
          <div class="brand">
            <img src="/brand.svg" alt="" />
            <div>
              <strong>Nimbo AI 控制台</strong>
              <span>你在这里手动回复前台</span>
            </div>
          </div>
          <button id="resetButton" class="ghost-button" type="button">重置</button>
        </header>
        <div id="emptyState" class="empty-state">选择一个用户开始回复</div>
        <div id="messages" class="messages compact" aria-live="polite"></div>
      </section>

      <aside class="operator-tools">
        <h1>回复面板</h1>
        <div id="selectedUser" class="selected-user">未选择用户</div>
        <div class="label-editor">
          <input id="labelInput" maxlength="40" placeholder="给这个玩家备注名字" aria-label="玩家备注名字" />
          <button id="labelButton" type="button">保存</button>
        </div>
        <textarea id="replyInput" rows="9" maxlength="1600" placeholder="输入你要假装成 Nimbo 发出的回复..."></textarea>
        <button id="replyButton" class="wide-button" type="button">发送回复</button>
        <button id="revealButton" class="wide-button secondary" type="button">发送揭晓</button>
        <button id="logoutButton" class="wide-button secondary" type="button">退出后台</button>
        <p>前台地址：<a href="/" target="_blank">打开公网前台</a></p>
      </aside>
    </main>
    <script src="/operator.js" type="module"></script>
  </body>
</html>
